# Redis Database for Dev Rest API (with web UI)
  redis-db:
    image: redis/redis-stack:latest
    restart: on-failure
    environment:
      - REDIS_ARGS=--appendonly yes
    ports:
      - 6378:6379
      - 8001:8001
    volumes:
      - redis_data:/data

volumes:
  gpg_data_vol:
  scap_data_vol:
  cert_data_vol:
  data_objects_vol:
  gvmd_data_vol:
  psql_data_vol:
  vt_data_vol:
  notus_data_vol:
  psql_socket_vol:
  gvmd_socket_vol:
  ospd_openvas_socket_vol:
  redis_socket_vol:
  openvas_data_vol:
  openvas_log_data_vol:
  gsa_data_vol:
  nginx_config_vol:
  nginx_certificates_vol:
  api_logs_vol:
  redis_data:
